<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <title>Color Palette Generator 🎨</title>
  </head>
  <body>
    <div class="container">
      <h1 class="title">Color Palette Generator 🎨</h1>
      <div class="subtitle">Pick one color..</div>

      <div class="palette-container" id="palette">
        <div class="color-card">
          <span class="color-code">#FFFFFF</span>
        </div>
        <div class="color-card">
          <span class="color-code">#FFFFFF</span>
        </div>
        <div class="color-card">
          <span class="color-code">#FFFFFF</span>
        </div>
        <div class="color-card">
          <span class="color-code">#FFFFFF</span>
        </div>
      </div>

      <div class="buttons">
        <button
          class="generate-btn"
          id="generateBtn"
          aria-label="Generate new color palette"
        >
          Generate
        </button>
      </div>

      <div class="hint">Click color to copy</div>
    </div>
  </body>
</html>
